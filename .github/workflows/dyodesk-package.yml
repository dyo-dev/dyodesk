name: DyoDesk Tek EXE Paketle

on:
  workflow_dispatch:
    inputs:
      x64_run_id:
        description: "Başarılı x64 derlemesinin Actions Run ID numarası"
        required: true
        type: string
      x86_run_id:
        description: "Başarılı x86 Legacy derlemesinin Actions Run ID numarası"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  package:
    name: Evrensel DyoDesk.exe oluştur
    runs-on: windows-2022

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: x64 DyoDesk artifact indir
        uses: actions/download-artifact@v4
        with:
          name: dyodesk-windows-x64-fast
          path: packaging/payload/x64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.x64_run_id }}

      - name: x86 Legacy DyoDesk artifact indir
        uses: actions/download-artifact@v4
        with:
          name: dyodesk-windows-x86-legacy
          path: packaging/payload/x86
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.x86_run_id }}

      - name: x64 ve x86 payload dosyalarını hazırla
        shell: powershell
        run: |
          foreach ($arch in @("x64", "x86")) {
            $payload = Join-Path `
              $env:GITHUB_WORKSPACE `
              "packaging\payload\$arch"

            $exe = Get-ChildItem `
              -Path $payload `
              -Recurse `
              -File `
              | Where-Object {
                  $_.Name -ieq "DyoDesk.exe" -or
                  $_.Name -ieq "rustdesk.exe"
                } `
              | Select-Object -First 1

            if (-not $exe) {
              throw "$arch artifact içinde DyoDesk.exe veya rustdesk.exe bulunamadı."
            }

            if ($exe.DirectoryName -ne $payload) {
              Get-ChildItem `
                -LiteralPath $exe.DirectoryName `
                -Force `
                | Copy-Item `
                    -Destination $payload `
                    -Recurse `
                    -Force
            }

            $rootDyoDesk = Join-Path $payload "DyoDesk.exe"
            $rootRustDesk = Join-Path $payload "rustdesk.exe"

            if (-not (Test-Path $rootDyoDesk) -and
                (Test-Path $rootRustDesk)) {
              Rename-Item `
                -LiteralPath $rootRustDesk `
                -NewName "DyoDesk.exe"
            }

            if (-not (Test-Path $rootDyoDesk)) {
              $nestedDyoDesk = Get-ChildItem `
                -Path $payload `
                -Filter "DyoDesk.exe" `
                -Recurse `
                -File `
                | Select-Object -First 1

              if ($nestedDyoDesk) {
                Copy-Item `
                  -LiteralPath $nestedDyoDesk.FullName `
                  -Destination $rootDyoDesk `
                  -Force
              }
            }

            if (-not (Test-Path $rootDyoDesk)) {
              throw "$arch paketleme klasöründe DyoDesk.exe hazırlanamadı."
            }
          }

      - name: x64 çalışma ikonunu doğrula
        shell: powershell
        run: |
          $expected = Join-Path `
            $env:GITHUB_WORKSPACE `
            "res\dyodesk_icon.ico"

          $runtime = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\payload\x64\data\flutter_assets\assets\icon.ico"

          if (-not (Test-Path $expected)) {
            throw "res\dyodesk_icon.ico bulunamadı."
          }

          if (-not (Test-Path $runtime)) {
            throw "x64 artifact içinde çalışma ikonu bulunamadı."
          }

          $expectedHash = (Get-FileHash `
            $expected `
            -Algorithm SHA256).Hash
          $runtimeHash = (Get-FileHash `
            $runtime `
            -Algorithm SHA256).Hash

          if ($expectedHash -ne $runtimeHash) {
            throw "Girilen x64_run_id eski ikonlu artifact'e ait."
          }

      - name: x64 ve x86 mimarilerini doğrula
        shell: powershell
        run: |
          function Get-PeMachine([string] $path) {
            $bytes = [System.IO.File]::ReadAllBytes($path)

            if ($bytes.Length -lt 256) {
              throw "Geçersiz PE dosyası: $path"
            }

            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            return [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          }

          $x64Exe = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\payload\x64\DyoDesk.exe"
          $x86Exe = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\payload\x86\DyoDesk.exe"

          $x64Machine = Get-PeMachine $x64Exe
          $x86Machine = Get-PeMachine $x86Exe

          if ($x64Machine -ne 0x8664) {
            throw "x64_run_id içindeki EXE x64 değil. PE Machine: $x64Machine"
          }

          if ($x86Machine -ne 0x014c) {
            throw "x86_run_id içindeki EXE x86 değil. PE Machine: $x86Machine"
          }

          $sciter = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\payload\x86\sciter.dll"

          if (-not (Test-Path $sciter)) {
            throw "x86 Legacy artifact içinde sciter.dll bulunamadı."
          }

          Write-Host "x64 ve x86 mimarileri doğrulandı."

      - name: NSIS kur
        shell: powershell
        run: |
          choco install nsis --no-progress -y

      - name: NSIS dosyasını Unicode olarak hazırla
        shell: powershell
        run: |
          $source = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\DyoDeskLauncher.nsi"

          $target = Join-Path `
            $env:GITHUB_WORKSPACE `
            "packaging\DyoDeskLauncher.unicode.nsi"

          $utf8 = [System.Text.UTF8Encoding]::new($false)
          $utf16 = [System.Text.UnicodeEncoding]::new($false, $true)

          $content = [System.IO.File]::ReadAllText($source, $utf8)
          [System.IO.File]::WriteAllText($target, $content, $utf16)

      - name: Evrensel DyoDesk.exe derle
        shell: powershell
        run: |
          New-Item `
            -ItemType Directory `
            -Path "packaging\output" `
            -Force | Out-Null

          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"

          if (-not (Test-Path $makensis)) {
            $makensis = "C:\Program Files\NSIS\makensis.exe"
          }

          if (-not (Test-Path $makensis)) {
            throw "makensis.exe bulunamadı."
          }

          $buildDate = Get-Date -Format "yyyy-MM-ddTHH:mm:ss"

          & $makensis `
            "/DPROJECT_ROOT=$env:GITHUB_WORKSPACE" `
            "/DBUILD_DATE=$buildDate" `
            /V3 `
            "packaging\DyoDeskLauncher.unicode.nsi"

          if ($LASTEXITCODE -ne 0) {
            throw "NSIS paketleme işlemi başarısız oldu."
          }

      - name: Evrensel Tek EXE artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: dyodesk-single-exe-universal-v1
          path: packaging/output/DyoDesk.exe
          retention-days: 14
